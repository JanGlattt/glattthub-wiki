    - Buchungsvorlauf-Analyse: BOOKING-LEAD-TIME-ANALYSIS.md
    - Stornierte Termine: CANCELLED-APPOINTMENTS-ANALYSIS.md
    - Wochentag & Uhrzeit-Analyse: WEEKDAY-TIME-ANALYSIS.md
  - Kunden:
