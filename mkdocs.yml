site_name: glatttHub Dokumentation
site_description: Dokumentation der glatttHub Web-Applikation
site_url: https://janglattt.github.io/glattthub-wiki/
repo_url: https://github.com/JanGlattt/glattthub-wiki

validation:
  links:
    not_found: info
    absolute_links: info
    unrecognized_links: info

theme:
  name: material
  language: de
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Dark Mode aktivieren
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Light Mode aktivieren
  font: false
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: assets/glattt-icon.png
  favicon: assets/favicon.png

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/glattthub
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search:
      lang: de
  - minify:
      minify_html: true
  - swagger-ui-tag:
      docExpansion: list
      tryItOutEnabled: true
      syntaxHighlightTheme: monokai

