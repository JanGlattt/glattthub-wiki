openapi: "3.0.3"
info:
  title: glatttHub REST-API
  version: "1.0"
  description: |
    REST-API für die glatttHub Web-Applikation.
    Authentifizierung via Bearer-Token (SHA-256 gehasht, `glh_`-Prefix).
    Rate-Limit: 60 Requests/Minute.
servers:
  - url: https://staging.hub.glattt.com/api/v1
    description: Staging
  - url: https://hub.glattt.com/api/v1
    description: Produktion
  - url: http://glattthub.local:8888/api/v1
    description: Lokale Entwicklung (MAMP)

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API-Token mit `glh_`-Prefix (z.B. `glh_abc123...`)"

  schemas:
    ClientStatistic:
      type: object
      properties:
        id:
          type: integer
          example: 1
        branch_id:
          type: string
          example: "urLYs9iAs3RUBrYaDZY9ew"
        full_name:
          type: string
          example: "Max Mustermann"
        first_name:
          type: string
          example: "Max"
        last_name:
          type: string
          example: "Mustermann"
        gender:
          type: string
          enum: [male, female, other]
          example: "male"
        name_origin:
          type: string
          example: "german"
        birth_date:
          type: string
          format: date
          example: "1990-05-15"
        age:
          type: integer
          example: 35
        age_group:
          type: string
          example: "26-35"
        postal_code:
          type: string
          example: "33619"
        city:
          type: string
          example: "Bielefeld"
        distance_to_branch_km:
          type: number
          format: float
          example: 2.5
        distance_group:
          type: string
          example: "0-5 km"
        first_appointment_date:
          type: string
          format: date
          example: "2024-01-15"
        last_appointment_date:
          type: string
          format: date
          example: "2026-03-01"
        total_appointments:
          type: integer
          example: 12
        has_consultation:
          type: boolean
          example: true
        first_consultation_date:
          type: string
          format: date
          nullable: true
          example: "2024-01-15"
        consultation_branch_id:
          type: string
          nullable: true
          example: "urLYs9iAs3RUBrYaDZY9ew"
        has_followup_after_consultation:
          type: boolean
          example: true
        has_contract:
          type: boolean
          example: true
        contract_count:
          type: integer
          example: 2
        contract_body_zone_count:
          type: integer
          example: 6
        is_full_body:
          type: boolean
          example: false
        has_cancellation:
          type: boolean
          example: false
        only_consultation_no_return:
          type: boolean
          example: false
        client_since:
          type: string
          format: date
          example: "2024-01-10"
        created_at:
          type: string
          format: date-time
          example: "2026-03-27T11:39:03+01:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-27T20:08:37+01:00"

    KpiItem:
      type: object
      properties:
        id:
          type: string
          example: "total_clients"
        label:
          type: string
          example: "Kunden gesamt"
        value:
          oneOf:
            - type: number
            - type: string
          example: 7629
        format:
          type: string
          enum: [number, percent]
          example: "number"

    PaginationLinks:
      type: object
      properties:
        first:
          type: string
        last:
          type: string
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Nicht autorisiert."

    BookingTracking:
      type: object
      properties:
        id:
          type: integer
          example: 1
        appointment_id:
          type: string
          example: "pho_appt_abc123"
        branch_id:
          type: string
          nullable: true
          example: "urLYs9iAs3RUBrYaDZY9ew"
        service_id:
          type: string
          nullable: true
          example: "svc_consultation"
        client_id:
          type: string
          nullable: true
          example: "client_123"
        ip_address:
          type: string
          nullable: true
          example: "203.0.113.42"
        user_agent:
          type: string
          nullable: true
          example: "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)"
        browser_name:
          type: string
          nullable: true
          example: "Chrome"
        browser_version:
          type: string
          nullable: true
          example: "120.0"
        os_name:
          type: string
          nullable: true
          example: "macOS"
        os_version:
          type: string
          nullable: true
          example: "14.2"
        device_type:
          type: string
          nullable: true
          enum: [desktop, mobile, tablet]
          example: "desktop"
        screen_width:
          type: integer
          nullable: true
          example: 1920
        screen_height:
          type: integer
          nullable: true
          example: 1080
        viewport_width:
          type: integer
          nullable: true
          example: 1440
        viewport_height:
          type: integer
          nullable: true
          example: 900
        language:
          type: string
          nullable: true
          example: "de-DE"
        referrer:
          type: string
          nullable: true
          example: "https://www.google.com/"
        landing_page:
          type: string
          nullable: true
          example: "https://www.glattt.com/hamburg/?utm_source=google"
        utm_source:
          type: string
          nullable: true
          example: "google"
        utm_medium:
          type: string
          nullable: true
          example: "cpc"
        utm_campaign:
          type: string
          nullable: true
          example: "brand_2024"
        utm_content:
          type: string
          nullable: true
          example: "ad_variant_a"
        utm_term:
          type: string
          nullable: true
          example: "haarentfernung hamburg"
        gclid:
          type: string
          nullable: true
          example: "CjwKCAiA_abc123"
        fbclid:
          type: string
          nullable: true
        booking_duration_seconds:
          type: integer
          nullable: true
          example: 185
        page_view_count:
          type: integer
          nullable: true
          example: 4
        cookie_consent:
          type: string
          nullable: true
          example: "all"
        booked_at:
          type: string
          format: date-time
          nullable: true
          example: "2024-12-15T14:30:00+00:00"
        created_at:
          type: string
          format: date-time
          example: "2026-03-30T16:45:12+00:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-30T16:45:12+00:00"

    BookingTrackingInput:
      type: object
      required:
        - appointment_id
      properties:
        appointment_id:
          type: string
          maxLength: 255
          description: Phorest Appointment-ID
          example: "pho_appt_abc123"
        branch_id:
          type: string
          maxLength: 255
          example: "urLYs9iAs3RUBrYaDZY9ew"
        service_id:
          type: string
          maxLength: 255
        client_id:
          type: string
          maxLength: 255
        user_agent:
          type: string
          maxLength: 2000
        browser_name:
          type: string
          maxLength: 100
        browser_version:
          type: string
          maxLength: 50
        os_name:
          type: string
          maxLength: 100
        os_version:
          type: string
          maxLength: 50
        device_type:
          type: string
          enum: [desktop, mobile, tablet]
        screen_width:
          type: integer
          minimum: 0
          maximum: 20000
        screen_height:
          type: integer
          minimum: 0
          maximum: 20000
        viewport_width:
          type: integer
          minimum: 0
          maximum: 20000
        viewport_height:
          type: integer
          minimum: 0
          maximum: 20000
        language:
          type: string
          maxLength: 20
        referrer:
          type: string
          maxLength: 2000
        landing_page:
          type: string
          maxLength: 2000
        utm_source:
          type: string
          maxLength: 255
        utm_medium:
          type: string
          maxLength: 255
        utm_campaign:
          type: string
          maxLength: 255
        utm_content:
          type: string
          maxLength: 255
        utm_term:
          type: string
          maxLength: 255
        gclid:
          type: string
          maxLength: 255
        fbclid:
          type: string
          maxLength: 255
        booking_duration_seconds:
          type: integer
          minimum: 0
          maximum: 86400
        page_view_count:
          type: integer
          minimum: 0
          maximum: 10000
        cookie_consent:
          type: string
          maxLength: 50
        booked_at:
          type: string
          format: date-time

paths:
  /client-statistics:
    get:
      summary: Kundenstatistiken auflisten
      description: Listet alle Kundenstatistiken mit Pagination und Filtern.
      operationId: listClientStatistics
      tags:
        - Kundenstatistiken
      parameters:
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          description: Einträge pro Seite
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Seitennummer
        - name: sort_by
          in: query
          schema:
            type: string
            default: id
          description: Sortier-Spalte
        - name: sort_direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sortierrichtung
        - name: branch_id
          in: query
          schema:
            type: string
          description: Filter nach Standort-ID
        - name: gender
          in: query
          schema:
            type: string
            enum: [male, female, other]
          description: Geschlecht
        - name: age_group
          in: query
          schema:
            type: string
          description: "Altersgruppe (z.B. 26-35, 36-45)"
        - name: has_contract
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Hat Vertrag
        - name: has_consultation
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Hat Beratung
        - name: has_cancellation
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Hat Stornierung
        - name: only_consultation_no_return
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Nur Beratung ohne Rückkehr
        - name: min_distance
          in: query
          schema:
            type: number
          description: Minimale Entfernung in km
        - name: max_distance
          in: query
          schema:
            type: number
          description: Maximale Entfernung in km
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: Erster Termin ab Datum (Y-m-d)
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: Erster Termin bis Datum (Y-m-d)
        - name: postal_code
          in: query
          schema:
            type: string
          description: Filter nach PLZ
      responses:
        "200":
          description: Erfolgreiche Abfrage
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientStatistic"
                  links:
                    $ref: "#/components/schemas/PaginationLinks"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Fehlender Scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate-Limit überschritten

  /client-statistics/kpis:
    get:
      summary: Aggregierte KPIs abrufen
      description: Gibt aggregierte Kennzahlen über alle Kundenstatistiken zurück. Akzeptiert die gleichen Filter wie der Index-Endpoint.
      operationId: getClientStatisticsKpis
      tags:
        - Kundenstatistiken
      parameters:
        - name: branch_id
          in: query
          schema:
            type: string
          description: Filter nach Standort-ID
        - name: gender
          in: query
          schema:
            type: string
            enum: [male, female, other]
          description: Geschlecht
        - name: has_contract
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Hat Vertrag
        - name: has_consultation
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Hat Beratung
      responses:
        "200":
          description: Erfolgreiche Abfrage
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/KpiItem"
        "401":
          description: Nicht autorisiert
        "403":
          description: Fehlender Scope

  /client-statistics/{id}:
    get:
      summary: Einzelnen Datensatz abrufen
      description: Gibt einen einzelnen Kundenstatistik-Datensatz zurück.
      operationId: getClientStatistic
      tags:
        - Kundenstatistiken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID des Datensatzes
      responses:
        "200":
          description: Erfolgreiche Abfrage
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ClientStatistic"
        "401":
          description: Nicht autorisiert
        "403":
          description: Fehlender Scope
        "404":
          description: Datensatz nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /booking-tracking:
    post:
      summary: Tracking-Daten speichern
      description: Speichert Browser-, Kampagnen- und Verhaltens-Tracking-Daten zu einer Terminbuchung. Wird vom WordPress-Booking-Plugin nach erfolgreicher Buchung aufgerufen (Server-zu-Server).
      operationId: storeBookingTracking
      tags:
        - Booking-Tracking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingTrackingInput"
      responses:
        "201":
          description: Tracking-Daten erfolgreich gespeichert
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BookingTracking"
        "401":
          description: Nicht autorisiert
        "403":
          description: "Fehlender Scope (booking-tracking:write)"
        "422":
          description: Validierungsfehler
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: object

  /booking-tracking/{appointmentId}:
    get:
      summary: Tracking-Daten abrufen
      description: Gibt die Tracking-Daten zu einer bestimmten Terminbuchung zurück.
      operationId: getBookingTracking
      tags:
        - Booking-Tracking
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
          description: Phorest Appointment-ID
      responses:
        "200":
          description: Erfolgreiche Abfrage
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BookingTracking"
        "401":
          description: Nicht autorisiert
        "403":
          description: "Fehlender Scope (booking-tracking:read)"
        "404":
          description: Keine Tracking-Daten gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Datensatz nicht gefunden."
